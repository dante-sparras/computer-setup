# Yazi configuration - Dante's setup

[manager]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
mouse_events   = ["click", "scroll"]

[preview]
tab_size      = 2
max_width     = 600
max_height    = 900
image_filter  = "triangle"
image_quality = 75

[opener]
edit = [
  { run = 'code-insiders.exe "$@"', block = true, desc = "VS Code Insiders" },
  { run = 'code.exe "$@"',        block = true, desc = "VS Code" },
]
